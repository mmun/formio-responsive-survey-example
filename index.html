<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Health Questionnaire</title>
    <link
      rel="stylesheet"
      href="https://cdn.form.io/formiojs/formio.full.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel intake-shell">
        <div class="panel__header">
          <p class="eyebrow">Behavioral Health Intake</p>
          <h1>Patient Health Questionnaire</h1>
          <p>
            Over the last 2 weeks, how often have you been bothered by the
            following problems?
          </p>
        </div>
        <div id="form"></div>
        <pre id="submission" class="submission"></pre>
      </section>
    </main>

    <script src="https://cdn.form.io/formiojs/formio.full.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
